<!DOCTYPE html>
<html>
<head>
    <title>Easy Todo List</title>
    <style>
        /* Basic, easy-to-read styling */
        body {
            font-family: Arial, sans-serif;
            margin: 40px;
            background-color: #f0f0f0;
        }
        .box {
            background-color: white;
            padding: 20px;
            border: 2px solid black;
            width: 300px;
        }
        ul {
            margin-top: 15px;
            padding-left: 20px;
        }
        li {
            margin-bottom: 8px;
        }
        .del-btn {
            color: red;
            margin-left: 10px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="box">
        <h2>My Simple To-Do</h2>

        <input type="text" id="myInput" placeholder="Write a task...">
        <button onclick="newItem()">Add</button>

        <ul id="myList"></ul>
    </div>

    <script>
        function newItem() {
            // 1. Get the text from the input box
            var text = document.getElementById("myInput").value;

            if (text === "") {
                alert("Please type something!");
                return;
            }

            // 2. Create a new list item (li)
            var li = document.createElement("li");
            li.innerText = text;

            // 3. Create a small clicker to delete it
            var removeSpan = document.createElement("span");
            removeSpan.innerText = "[Delete]";
            removeSpan.className = "del-btn";
            
            // Make the delete text work when clicked
            removeSpan.onclick = function() {
                li.remove();
            };

            // 4. Put the delete button inside the li, then put the li in the ul
            li.appendChild(removeSpan);
            document.getElementById("myList").appendChild(li);

            // 5. Clear the input box for the next task
            document.getElementById("myInput").value = "";
        }
    </script>

</body>
</html>
