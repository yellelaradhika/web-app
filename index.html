<!DOCTYPE html>
<html>
<head>
    <title>My Links Dashboard</title>
    
    <style>
        /* 1. Page Background and Font */
        body {
            background-color: #f3e5f5; /* Light purple background */
            font-family: Arial, sans-serif;
            text-align: center;
            margin: 0;
            padding: 50px 20px;
        }

        /* 2. The Main Profile Container Card */
        .profile-card {
            background-color: white;
            max-width: 400px;
            margin: 0 auto; /* Centers the card on the screen */
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0px 10px 20px rgba(0, 0, 0, 0.1); /* Soft shadow */
        }

        /* 3. Style for the Profile Name */
        h2 {
            color: #4a148c; /* Dark purple */
            margin-bottom: 5px;
        }

        p.bio {
            color: #757575;
            font-size: 14px;
            margin-bottom: 30px;
        }

        /* 4. Styling the Link Buttons */
        .link-btn {
            display: block; /* Makes the button take up the whole width */
            background-color: #8e24aa; /* Vibrant purple */
            color: white;
            text-decoration: none; /* Removes the underline from links */
            padding: 15px;
            margin: 15px 0;
            border-radius: 10px;
            font-weight: bold;
            font-size: 16px;
            transition: background 0.2s; /* Makes the color change smooth */
        }

        /* 5. Change button color when hovering over it */
        .link-btn:hover {
            background-color: #d81b60; /* Changes to pink on hover */
        }
    </style>
</head>
<body>

    <div class="profile-card">
        
        <h2>@YourName Here</h2>
        <p class="bio">Welcome to my space! Check out my work and cool things I find on the internet below.</p>

        <a href="#" target="_blank" class="link-btn">🌐 Visit My Portfolio</a>
        <a href="#" target="_blank" class="link-btn">📸 Follow Me on Instagram</a>
        <a href="#" target="_blank" class="link-btn">💻 Check Out My GitHub</a>
        <a href="#" target="_blank" class="link-btn">📝 Read My Blog</a>

    </div>

</body>
</html>
